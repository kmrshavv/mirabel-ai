services:
  - type: web
    name: mirabel-backend
    runtime: python
    repo: https://github.com/kmrshavv/mirabel-ai-app
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
